name: dbt build

on:
  pull_request:
    paths:
      - "warehouse/**"
      - "output/**"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dbt-duckdb
        run: uv tool install dbt-duckdb

      - name: dbt build
        working-directory: warehouse
        run: dbt build
